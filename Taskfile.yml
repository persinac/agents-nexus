version: '3'

dotenv: ['.env.local', '.env']

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  # =============================================================================
  # Setup
  # =============================================================================

  install:
    desc: Install all dependencies (mnemon, arbiter, dashboard)
    cmds:
      - task: mnemon:install
      - task: arbiter:install
      - task: dashboard:install

  # =============================================================================
  # Arbiter (A2A hub + WebSocket bridge)
  # =============================================================================

  arbiter:start:
    desc: Start the arbiter server
    dir: arbiter
    cmds:
      - npm start

  arbiter:dev:
    desc: Start the arbiter server with file watching
    dir: arbiter
    cmds:
      - npm run dev

  arbiter:install:
    desc: Install arbiter dependencies
    dir: arbiter
    cmds:
      - npm install

  # =============================================================================
  # Dashboard (pixel UI)
  # =============================================================================

  dashboard:dev:
    desc: Start the dashboard UI in dev mode
    dir: dashboard/ui
    cmds:
      - npm run dev

  dashboard:build:
    desc: Build the dashboard UI
    dir: dashboard/ui
    cmds:
      - npm run build

  dashboard:install:
    desc: Install dashboard dependencies
    dir: dashboard/ui
    cmds:
      - npm install

  # =============================================================================
  # Mnemon (memory MCP server)
  # =============================================================================

  mnemon:install:
    desc: Create venv and install mnemon dependencies
    dir: mnemon
    cmds:
      - uv sync --extra mcp

  mnemon:serve:
    desc: Start the mnemon MCP server
    dir: mnemon
    cmds:
      - uv run agent-memory-serve

  mnemon:migrate:
    desc: Run database migrations
    dir: mnemon
    cmds:
      - cmd: |
          PSQL_URL=$(echo "$DATABASE_URL" | sed 's/[&?]search_path=[^&]*//')
          PGOPTIONS="-c search_path=agents,public" psql "$PSQL_URL" -f migrations/001_initial_schema.sql

  mnemon:cloud-migrate:
    desc: Migrate memory_nodes, memory_entities, memory_links from cloud Postgres to local
    cmds:
      - cmd: |
          set -e
          LOCAL=$(echo "$DATABASE_URL" | sed 's/[&?]search_path=[^&]*//')
          CLOUD=$(echo "$CLOUD_DATABASE_URL" | sed 's/[&?]search_path=[^&]*//')
          for table in memory_entities memory_nodes memory_links; do
            echo "→ migrating agents.$table ..."
            docker run --rm postgres:15 pg_dump "$CLOUD" \
              --data-only --table="agents.$table" \
              --no-owner --no-acl \
              | PGOPTIONS="-c search_path=agents,public" psql "$LOCAL"
          done
          echo "Done."

  mnemon:test:
    desc: Run mnemon tests
    dir: mnemon
    cmds:
      - uv run pytest {{.CLI_ARGS}}

  mnemon:fmt:
    desc: Format and lint mnemon
    dir: mnemon
    cmds:
      - uv run ruff format .
      - uv run ruff check --fix .

  # =============================================================================
  # Stack lifecycle (arbiter + dashboard + mnemon)
  # =============================================================================

  kill:
    desc: Kill arbiter tmux window and mnemon MCP server
    cmds:
      - tmux kill-window -t ${TMUX_SESSION:-agents}:arbiter 2>/dev/null || true
      - pkill -f "agent_memory.server.mcp_server" || true

  up:
    desc: Start docker stack, arbiter (tmux window), and mnemon in the background
    cmds:
      - docker compose up -d
      - cmd: |
          tmux new-window -d -t "${TMUX_SESSION:-agents}:" -n arbiter "cd {{.TASKFILE_DIR}} && task arbiter:start" 2>/dev/null \
            || echo "Warning: could not spawn arbiter tmux window — is the '${TMUX_SESSION:-agents}' session running?"
          echo "Arbiter started in tmux window 'arbiter' (attach: tmux select-window -t ${TMUX_SESSION:-agents}:arbiter)"
      - cmd: |
          nohup bash -c 'cd {{.TASKFILE_DIR}}/mnemon && uv run agent-memory-serve' > /tmp/mnemon.log 2>&1 &
          echo "Started mnemon. Log: /tmp/mnemon.log"

  restart:
    desc: Kill and restart all services (arbiter, dashboard, mnemon)
    cmds:
      - task: kill
      - sleep 1
      - task: up

  logs:
    desc: Tail mnemon log (arbiter output is in tmux window 'agents:arbiter')
    cmds:
      - tail -f /tmp/mnemon.log

  # =============================================================================
  # Docker Compose (knowledge stack)
  # =============================================================================

  docker:up:
    desc: Start the full knowledge stack in the background
    cmds:
      - docker compose up -d

  docker:down:
    desc: Stop all services (data volumes preserved)
    cmds:
      - docker compose down

  docker:restart:
    desc: Restart a single service (e.g. task docker:restart -- spark)
    cmds:
      - docker compose restart {{.CLI_ARGS}}

  docker:logs:
    desc: Tail logs for all services (or pass a service name)
    cmds:
      - docker compose logs -f {{.CLI_ARGS}}

  docker:status:
    desc: Show container health and uptime
    cmds:
      - docker compose ps

  docker:init:
    desc: First-time setup — pull embedding models
    cmds:
      - docker compose --profile init run --rm ollama-init

  docker:build:
    desc: Rebuild all images without cache
    cmds:
      - docker compose build --no-cache

  # =============================================================================
  # Spark (semantic repo search)
  # =============================================================================

  spark:pipeline:
    desc: Run the full Spark nightly pipeline (reclaim + synthesize)
    cmds:
      - bash spark/scripts/spark-pipeline.sh {{.CLI_ARGS}}

  spark:reclaim:
    desc: Full index rebuild (runs inside the spark container)
    cmds:
      - docker compose exec spark uv run spark reclaim {{.CLI_ARGS}}

  spark:activate:
    desc: Re-index a single repo (e.g. task spark:activate -- my-repo)
    cmds:
      - docker compose exec spark uv run spark activate {{.CLI_ARGS}}

  spark:status:
    desc: Show index stats
    cmds:
      - docker compose exec spark uv run spark status

  # =============================================================================
  # Langfuse (optional observability — task langfuse:up to start)
  # =============================================================================

  langfuse:up:
    desc: Start the Langfuse observability stack (data volumes persist across restarts)
    cmds:
      - docker compose --profile langfuse up -d

  langfuse:down:
    desc: Stop Langfuse (data volumes preserved — use down -v to wipe)
    cmds:
      - docker compose --profile langfuse down

  langfuse:update:
    desc: Pull latest Langfuse images and restart
    cmds:
      - docker compose --profile langfuse pull langfuse-web langfuse-worker
      - docker compose --profile langfuse up -d

  langfuse:logs:
    desc: Tail Langfuse web + worker logs
    cmds:
      - docker compose logs -f langfuse-web langfuse-worker

  langfuse:status:
    desc: Show Langfuse container health
    cmds:
      - docker compose ps langfuse-web langfuse-worker langfuse-postgres langfuse-redis langfuse-clickhouse langfuse-minio

  # =============================================================================
  # GitLab jobs
  # =============================================================================

  gl:reviews:
    desc: Show open MRs where you're a reviewer, priority-sorted
    cmds:
      - uv run scripts/gl-review-queue.py {{.CLI_ARGS}}

  gl:reviews:daily:
    desc: Show review queue and append to today's Obsidian daily note
    cmds:
      - uv run scripts/gl-review-queue.py --daily {{.CLI_ARGS}}

  gl:reviews:prune:
    desc: Remove yourself as reviewer from MRs older than 6mo (--min-age N to override)
    cmds:
      - uv run scripts/gl-review-prune.py {{.CLI_ARGS}}

  gl:reviews:prune:dry:
    desc: Preview stale MRs that would be pruned without making changes
    cmds:
      - uv run scripts/gl-review-prune.py --dry-run {{.CLI_ARGS}}

  # =============================================================================
  # Nightly pipeline
  # =============================================================================

  nightly:sync:
    desc: Sync all repos under $REPO_DIR (stash, fetch, pull default branch)
    cmds:
      - bash scripts/repo-sync.sh {{.CLI_ARGS}}

  nightly:vault-commit:
    desc: Auto-commit and push vault changes
    cmds:
      - bash scripts/vault-commit.sh {{.CLI_ARGS}}

  nightly:all:
    desc: Run the full nightly pipeline (repo sync → vault commit → spark)
    cmds:
      - task: nightly:sync
      - task: nightly:vault-commit
      - task: spark:pipeline

  # =============================================================================
  # Obsidian jobs
  # =============================================================================

  obs:tag:
    desc: Enhance Obsidian notes with tags via Claude Haiku (incremental by default)
    cmds:
      - uv run scripts/obs-tag-enhance.py {{.CLI_ARGS}}

  obs:tag:dry:
    desc: Preview tag enhancement without writing
    cmds:
      - uv run scripts/obs-tag-enhance.py --dry-run {{.CLI_ARGS}}

  obs:decay:
    desc: Flag stale notes and archive 90d+ old notes
    cmds:
      - uv run scripts/obs-decay-monitor.py {{.CLI_ARGS}}

  obs:decay:dry:
    desc: Preview decay monitor without writing or archiving
    cmds:
      - uv run scripts/obs-decay-monitor.py --dry-run {{.CLI_ARGS}}

  # =============================================================================
  # Autostart (macOS launchd)
  # =============================================================================

  launchd:install:
    desc: Install launchd agent so Docker stack starts at login
    vars:
      NEXUS_DIR:
        sh: pwd
    cmds:
      - sed "s|__AGENTS_NEXUS_DIR__|{{.NEXUS_DIR}}|g" launchd/com.agents-nexus.docker.plist > ~/Library/LaunchAgents/com.agents-nexus.docker.plist
      - launchctl load ~/Library/LaunchAgents/com.agents-nexus.docker.plist
      - echo "Installed - stack will start at next login (or run task docker:up)"

  launchd:uninstall:
    desc: Remove the launchd autostart agent
    cmds:
      - launchctl unload ~/Library/LaunchAgents/com.agents-nexus.docker.plist || true
      - rm -f ~/Library/LaunchAgents/com.agents-nexus.docker.plist

  launchd:install:gl-reviews:
    desc: Install launchd agent to write GitLab review queue to daily note at 8:05am on weekdays
    vars:
      NEXUS_DIR:
        sh: pwd
    cmds:
      - sed "s|__AGENTS_NEXUS_DIR__|{{.NEXUS_DIR}}|g" launchd/com.agents-nexus.gl-reviews.plist > ~/Library/LaunchAgents/com.agents-nexus.gl-reviews.plist
      - launchctl load ~/Library/LaunchAgents/com.agents-nexus.gl-reviews.plist
      - echo "Installed — review queue runs weekdays at 8:05am (logs at /tmp/agents-nexus-gl-reviews.log)"

  launchd:uninstall:gl-reviews:
    desc: Remove the GitLab review queue launchd agent
    cmds:
      - launchctl unload ~/Library/LaunchAgents/com.agents-nexus.gl-reviews.plist || true
      - rm -f ~/Library/LaunchAgents/com.agents-nexus.gl-reviews.plist

  launchd:install:obs-tag:
    desc: Install launchd agent to run obs:tag daily at 6:30am (after obs:tidy)
    vars:
      NEXUS_DIR:
        sh: pwd
    cmds:
      - sed "s|__AGENTS_NEXUS_DIR__|{{.NEXUS_DIR}}|g" launchd/com.agents-nexus.obs-tag.plist > ~/Library/LaunchAgents/com.agents-nexus.obs-tag.plist
      - launchctl load ~/Library/LaunchAgents/com.agents-nexus.obs-tag.plist
      - echo "Installed — obs:tag runs daily at 6:30am (logs at /tmp/agents-nexus-obs-tag.log)"

  launchd:uninstall:obs-tag:
    desc: Remove the obs:tag launchd agent
    cmds:
      - launchctl unload ~/Library/LaunchAgents/com.agents-nexus.obs-tag.plist || true
      - rm -f ~/Library/LaunchAgents/com.agents-nexus.obs-tag.plist

  launchd:install:muninn:
    desc: Install launchd agent for muninn sync (rM1 → Obsidian) — weekdays 8/12/17:30
    vars:
      NEXUS_DIR:
        sh: pwd
    cmds:
      - sed "s|__AGENTS_NEXUS_DIR__|{{.NEXUS_DIR}}|g" launchd/com.agents-nexus.muninn.sync.plist > ~/Library/LaunchAgents/com.agents-nexus.muninn.sync.plist
      - launchctl load ~/Library/LaunchAgents/com.agents-nexus.muninn.sync.plist
      - echo "Installed — muninn syncs weekdays at 8/12/17:30 (logs at /tmp/muninn-sync.log)"

  launchd:uninstall:muninn:
    desc: Remove the muninn launchd agent
    cmds:
      - launchctl unload ~/Library/LaunchAgents/com.agents-nexus.muninn.sync.plist || true
      - rm -f ~/Library/LaunchAgents/com.agents-nexus.muninn.sync.plist

  launchd:install:obs-decay:
    desc: Install launchd agent to run obs:decay weekly on Sundays at noon
    vars:
      NEXUS_DIR:
        sh: pwd
    cmds:
      - sed "s|__AGENTS_NEXUS_DIR__|{{.NEXUS_DIR}}|g" launchd/com.agents-nexus.obs-decay.plist > ~/Library/LaunchAgents/com.agents-nexus.obs-decay.plist
      - launchctl load ~/Library/LaunchAgents/com.agents-nexus.obs-decay.plist
      - echo "Installed — obs:decay runs Sundays at noon (logs at /tmp/agents-nexus-obs-decay.log)"

  launchd:uninstall:obs-decay:
    desc: Remove the obs:decay launchd agent
    cmds:
      - launchctl unload ~/Library/LaunchAgents/com.agents-nexus.obs-decay.plist || true
      - rm -f ~/Library/LaunchAgents/com.agents-nexus.obs-decay.plist

  launchd:install:gl-reviews-prune:
    desc: Install launchd agent to prune stale reviewer assignments daily at 4pm
    vars:
      NEXUS_DIR:
        sh: pwd
    cmds:
      - sed "s|__AGENTS_NEXUS_DIR__|{{.NEXUS_DIR}}|g" launchd/com.agents-nexus.gl-reviews-prune.plist > ~/Library/LaunchAgents/com.agents-nexus.gl-reviews-prune.plist
      - launchctl load ~/Library/LaunchAgents/com.agents-nexus.gl-reviews-prune.plist
      - echo "Installed — reviewer prune runs daily at 4pm (logs at /tmp/agents-nexus-gl-reviews-prune.log)"

  launchd:uninstall:gl-reviews-prune:
    desc: Remove the GitLab reviewer prune launchd agent
    cmds:
      - launchctl unload ~/Library/LaunchAgents/com.agents-nexus.gl-reviews-prune.plist || true
      - rm -f ~/Library/LaunchAgents/com.agents-nexus.gl-reviews-prune.plist
