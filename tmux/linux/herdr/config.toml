# herdr config for the agents-nexus fleet on Linux — the interactive UX-parity layer.
# Mirror of tmux/mac/herdr/config.toml. __HOME__ is substituted by tmux/linux/install.sh;
# `herdr server reload-config` applies edits. Recreates the tmux muscle memory:
#   ctrl+a prefix · ctrl+a <digit> jump-to-agent · ctrl+a N fuzzy picker · ctrl+a shift+b new bucket.
[keys]
prefix = "ctrl+a"

# ctrl+a then a digit -> jump straight to that agent (the tmux window-number feel).
focus_agent = "prefix+1..9"
switch_tab = ""
# ctrl+a x -> close the focused AGENT. Unbind herdr's native close_pane (default
# prefix+x) so the [[keys.command]] shim below owns it: the shim DEREGISTERS the agent
# (herdr's missing pane-died analog) before closing, so herdr-recover doesn't respawn a
# deliberate close. herdr fires no pane-died event — see bin/herdr-close-agent.sh.
close_pane = ""

# ctrl+a + shift+<arrow OR hjkl> -> SWAP the focused pane toward a neighbour. NOTE: herdr
# has NO native swap_pane_* key action (verified vs 0.7.4 --default-config), so the old
# swap_pane_* scalars were silently ignored — that's why moving panes did nothing. It is
# implemented as [[keys.command]] shims alongside the focus shims below.

# Plugin keybindings (e.g. nexus-fleet's picker on shift+n / shift+b) are NOT in the
# base config — scripts/herdr-plugin-install.sh appends them per-machine when you opt
# into a plugin (herdr manifests can't declare keys). Base config stays plugin-free.

# ctrl+a + <arrow> -> focus the pane in that direction. herdr's native focus_pane_*
# keep ctrl+a h/j/k/l working; a native action binds only ONE key, so these command
# shims ADD the arrows without dropping h/l. --current targets the focused pane.
# __HERDR_BIN__ is the resolved herdr path (install.sh substitutes it) — the systemd
# server runs with a stripped PATH, so a bare `herdr` would not resolve.
[[keys.command]]
key = "prefix+left"
type = "shell"
command = "__HERDR_BIN__ pane focus --direction left --current"

[[keys.command]]
key = "prefix+right"
type = "shell"
command = "__HERDR_BIN__ pane focus --direction right --current"

[[keys.command]]
key = "prefix+up"
type = "shell"
command = "__HERDR_BIN__ pane focus --direction up --current"

[[keys.command]]
key = "prefix+down"
type = "shell"
command = "__HERDR_BIN__ pane focus --direction down --current"

# ctrl+a + shift+<arrow OR hjkl> -> SWAP the focused pane with its neighbour in that
# direction (grab-and-move). Shims because herdr has NO native swap_pane_* action; both
# arrows and hjkl are wired so it works regardless of terminal shift+arrow support.
[[keys.command]]
key = "prefix+shift+left"
type = "shell"
command = "__HERDR_BIN__ pane swap --direction left --current"

[[keys.command]]
key = "prefix+shift+h"
type = "shell"
command = "__HERDR_BIN__ pane swap --direction left --current"

[[keys.command]]
key = "prefix+shift+right"
type = "shell"
command = "__HERDR_BIN__ pane swap --direction right --current"

[[keys.command]]
key = "prefix+shift+l"
type = "shell"
command = "__HERDR_BIN__ pane swap --direction right --current"

[[keys.command]]
key = "prefix+shift+up"
type = "shell"
command = "__HERDR_BIN__ pane swap --direction up --current"

[[keys.command]]
key = "prefix+shift+k"
type = "shell"
command = "__HERDR_BIN__ pane swap --direction up --current"

[[keys.command]]
key = "prefix+shift+down"
type = "shell"
command = "__HERDR_BIN__ pane swap --direction down --current"

[[keys.command]]
key = "prefix+shift+j"
type = "shell"
command = "__HERDR_BIN__ pane swap --direction down --current"

# ctrl+a + shift+c -> prompt for a goal (in-pane) and run a Conductor mission.
# Migrated from the old tmux `bind C` when herdr became the default backend
# (NEXUS_SUBSTRATE=herdr): the shell binding opens a focused pane, the inline bash
# prompts for the goal where there's a real TTY, then execs conductor-run.sh
# (left untouched — it already gates LIVE on hostname `nexus`).
[[keys.command]]
key = "prefix+shift+c"
type = "shell"
command = "__HERDR_BIN__ agent start conductor --focus -- bash -lc 'read -r -p \"conductor goal: \" g; exec \"$HOME/.tmux/conductor-run.sh\" \"$g\"'"

# ctrl+a x -> DEREGISTER-then-close the focused agent — herdr's missing pane-died hook.
# herdr emits no pane-died/closed event, so without this a closed agent's stale
# ~/.tmux/registry entry looks like a crash casualty and herdr-recover revives it. The
# shim resolves the focused pane, runs agent-deregister.sh + worktree-cleanup.sh (the same
# scripts tmux's pane-died hook uses), then `herdr pane close`. Overrides the native
# close_pane (unbound above). __HERDR_BIN__/__HOME__ substituted by install.sh; herdr runs
# type=shell via sh -c, so the VAR=val env prefix is honored.
[[keys.command]]
key = "prefix+x"
type = "shell"
command = "HERDR_BIN=__HERDR_BIN__ NEXUS_TMUX_DIR=__HOME__/.tmux __HOME__/.tmux/herdr-close-agent.sh"

[ui]
show_agent_labels_on_pane_borders = true
# Sidebar as the always-visible "all agents at a glance" view (the tmux status-bar minimap
# analog): readable when expanded (toggle ctrl+a b), a narrow always-on rail when collapsed,
# sorted attention-first so blocked/idle agents surface first.
sidebar_width = 32
sidebar_collapsed_mode = "compact"
agent_panel_sort = "priority"
