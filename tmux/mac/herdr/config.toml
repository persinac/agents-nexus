# herdr config for the agents-nexus fleet — the interactive UX-parity layer.
# Recreates the tmux muscle memory when herdr is the multiplexer:
#   ctrl+a prefix · ctrl+a <digit> jump-to-agent · ctrl+a N fuzzy repo picker.
# Deployed to ~/.config/herdr/config.toml by install.sh. `herdr server reload-config` applies edits.

[keys]
prefix = "ctrl+a"

# ctrl+a then a digit -> jump straight to that agent (the tmux window-number feel).
# Point the numeric row at focus_agent; free it from the default tab-switch.
focus_agent = "prefix+1..9"
switch_tab = ""

# ctrl+a + shift+<arrow OR hjkl> -> SWAP the focused pane toward a neighbour. NOTE: herdr
# has NO native swap_pane_* key action (verified vs 0.7.4 --default-config), so the old
# swap_pane_* scalars were silently ignored — that's why moving panes did nothing. It is
# implemented as [[keys.command]] shims alongside the focus shims below.

# Plugin keybindings (e.g. nexus-fleet's picker on shift+n / shift+b) are NOT in the
# base config — scripts/herdr-plugin-install.sh appends them per-machine when you opt
# into a plugin (herdr manifests can't declare keys). Base config stays plugin-free.

# ctrl+a + <arrow> -> focus the pane in that direction. herdr's native
# focus_pane_* keep ctrl+a h/j/k/l working; a native action binds only ONE key,
# so these command shims ADD the arrows without dropping h/l. --current targets
# the focused pane; the absolute herdr path is required because the launchd
# server runs with a stripped PATH.
[[keys.command]]
key = "prefix+left"
type = "shell"
command = "/opt/homebrew/bin/herdr pane focus --direction left --current"

[[keys.command]]
key = "prefix+right"
type = "shell"
command = "/opt/homebrew/bin/herdr pane focus --direction right --current"

[[keys.command]]
key = "prefix+up"
type = "shell"
command = "/opt/homebrew/bin/herdr pane focus --direction up --current"

[[keys.command]]
key = "prefix+down"
type = "shell"
command = "/opt/homebrew/bin/herdr pane focus --direction down --current"

# ctrl+a + shift+<arrow OR hjkl> -> SWAP the focused pane with its neighbour in that
# direction (grab-and-move). Shims because herdr has NO native swap_pane_* action; both
# arrows and hjkl are wired so it works regardless of terminal shift+arrow support.
[[keys.command]]
key = "prefix+shift+left"
type = "shell"
command = "/opt/homebrew/bin/herdr pane swap --direction left --current"

[[keys.command]]
key = "prefix+shift+h"
type = "shell"
command = "/opt/homebrew/bin/herdr pane swap --direction left --current"

[[keys.command]]
key = "prefix+shift+right"
type = "shell"
command = "/opt/homebrew/bin/herdr pane swap --direction right --current"

[[keys.command]]
key = "prefix+shift+l"
type = "shell"
command = "/opt/homebrew/bin/herdr pane swap --direction right --current"

[[keys.command]]
key = "prefix+shift+up"
type = "shell"
command = "/opt/homebrew/bin/herdr pane swap --direction up --current"

[[keys.command]]
key = "prefix+shift+k"
type = "shell"
command = "/opt/homebrew/bin/herdr pane swap --direction up --current"

[[keys.command]]
key = "prefix+shift+down"
type = "shell"
command = "/opt/homebrew/bin/herdr pane swap --direction down --current"

[[keys.command]]
key = "prefix+shift+j"
type = "shell"
command = "/opt/homebrew/bin/herdr pane swap --direction down --current"

# ctrl+a + shift+c -> prompt for a goal (in-pane) and run a Conductor mission.
# Migrated from the old tmux `bind C` when herdr became the default backend
# (NEXUS_SUBSTRATE=herdr): the shell binding opens a focused pane, the inline bash
# prompts for the goal where there's a real TTY, then execs conductor-run.sh
# (left untouched — it already gates LIVE on hostname `nexus`).
[[keys.command]]
key = "prefix+shift+c"
type = "shell"
command = "/opt/homebrew/bin/herdr agent start conductor --focus -- bash -lc 'read -r -p \"conductor goal: \" g; exec \"$HOME/.tmux/conductor-run.sh\" \"$g\"'"

[ui]
show_agent_labels_on_pane_borders = true
# Agent sidebar as the always-visible "all agents at a glance" view (the analog of the
# tmux status-bar minimap): a readable width when expanded (toggle with ctrl+a b), and a
# narrow always-on rail — never zero-width — when collapsed. Sorted by attention queue
# so blocked/idle agents surface first (set to "spaces" to group by workspace instead).
sidebar_width = 32
sidebar_collapsed_mode = "compact"
agent_panel_sort = "priority"
