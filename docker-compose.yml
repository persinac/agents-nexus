name: agents-nexus

# Knowledge stack: Postgres + pgvector, Ollama, 343 Guilty Spark, mnemon flush daemon, dashboard UI.
# Arbiter runs natively (needs tmux socket) — start with: task arbiter:start
#
# First-time setup:
#   cp .env.example .env && $EDITOR .env
#   docker compose up -d
#   docker compose run --rm ollama-init   # pull embedding model once

services:

  # ── Core Infrastructure ──────────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    container_name: nexus-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agents}
      POSTGRES_USER: ${POSTGRES_USER:-agents}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/00_init.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
      - ./mnemon/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/01_mnemon.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agents} -d ${POSTGRES_DB:-agents}"]
      interval: 5s
      timeout: 3s
      retries: 15

  ollama:
    image: ollama/ollama:latest
    container_name: nexus-ollama
    restart: always
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # One-shot: pulls embedding model. Re-run manually if you add models.
  ollama-init:
    image: ollama/ollama:latest
    container_name: nexus-ollama-init
    restart: "no"
    profiles: ["init"]
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama pull nomic-embed-text
        echo "[nexus] models ready"

  # ── Knowledge Services ───────────────────────────────────────────────────

  # 343 Guilty Spark — semantic index over all repos
  spark:
    build:
      context: ${SPARK_SOURCE:?Set SPARK_SOURCE in .env (path to guilty-spark repo)}
    container_name: nexus-spark
    restart: always
    environment:
      OLLAMA_API_BASE: http://ollama:11434
      SPARK_CONFIG: /app/config.yaml
      SPARK_INSTALLATIONS_PATH: /repos
      SPARK_INDEX_PATH: /app/data/the-index
      GITLAB_URL: ${GITLAB_URL:-}
      GITLAB_TOKEN: ${GITLAB_TOKEN:-}
      SPARK_WEBHOOK_SECRET: ${SPARK_WEBHOOK_SECRET:-}
    volumes:
      # Mount live config so team mappings + settings stay current without rebuilding
      - ${SPARK_SOURCE}/config.yaml:/app/config.yaml:ro
      # Repos to index (read-only; spark activate also does git pull, set rw if needed)
      - ${REPOS_PATH:?Set REPOS_PATH in .env}:/repos:ro
      # Persist the LanceDB vector index across restarts
      - spark-index:/app/data/the-index
    ports:
      - "${SPARK_PORT:-8343}:8343"
    command: ["serve", "--transport", "sse", "--host", "0.0.0.0", "--port", "8343"]
    depends_on:
      ollama:
        condition: service_healthy

  # mnemon flush daemon — drains ~/.tmux/memory-events.jsonl into Postgres every 2 min
  mnemon-flush:
    build:
      context: .
      dockerfile: docker/mnemon.Dockerfile
    container_name: nexus-mnemon-flush
    restart: always
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-agents}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agents}?sslmode=disable
      HOME: /host-home
    volumes:
      # Hook scripts on host write events here; flush daemon drains them
      - ${HOST_TMUX_DIR:?Set HOST_TMUX_DIR in .env (usually ~/.tmux)}:/host-home/.tmux
    depends_on:
      postgres:
        condition: service_healthy

  # ── Dashboard ────────────────────────────────────────────────────────────

  # Pixel office UI — connects to arbiter at ws://localhost:8420
  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard.Dockerfile
    container_name: nexus-dashboard
    restart: always
    ports:
      - "${DASHBOARD_PORT:-8421}:80"

volumes:
  postgres-data:
  ollama-data:
  spark-index:
