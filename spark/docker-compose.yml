services:
  ollama:
    image: ollama/ollama:latest
    container_name: guilty-spark-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  spark:
    build: .
    container_name: guilty-spark
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_API_BASE=http://ollama:11434
      - SPARK_CONFIG=/app/config.yaml
      - SPARK_WEBHOOK_SECRET=${SPARK_WEBHOOK_SECRET:-}
    volumes:
      # Mount repos read-write (webhook needs git pull)
      - ${REPOS_PATH:-~/repos}:/repos
      # Persist the index
      - spark-index:/app/data/the-index
    ports:
      - "8343:8343"
    entrypoint: ["uv", "run", "spark"]
    command: ["serve", "--transport", "sse", "--port", "8343"]

  # Cloudflare Tunnel — exposes Spark to GitLab for webhooks
  # Set CLOUDFLARE_TUNNEL_TOKEN in .env
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: guilty-spark-tunnel
    depends_on:
      - spark
    command: ["tunnel", "run"]
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN:-}

volumes:
  ollama-data:
  spark-index:
