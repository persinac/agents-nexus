# Example overlay manifest. Copy this file (and the files/ tree) into a PRIVATE repo,
# then fill it in. See README.md for the full field reference.
#
# Applied by:  scripts/overlay-apply.sh <git-url|path>   (or  ./install.sh --overlay <…>)

# REQUIRED. Unique short name for THIS overlay ([A-Za-z0-9._-]). Overlays compose: this name
# keys its own clone dir (overlay/<name>/), stamp (.overlay-applied.<name>), and .git/info/exclude
# block — so an `org` overlay and a `personal` overlay coexist and are removed independently.
name = "example"

# Directory whose tree mirrors paths under the core repo root. Default: "files".
files_dir = "files"

# Placeholder substitution after copy (__HOME__ → $HOME, __NODE_BIN__ → dir of `node`).
# Ship host units with placeholders so the overlay is portable across machines.
[[template]]
glob = "launchd/*.plist"

# Repoint Conductor at your real reporting config (with live Jira/Confluence/MR/Trello
# targets) without touching the core's tracked, neutral config/conductor.yaml.
[[symlink]]
link   = "~/.tmux/conductor.yaml"
target = "config/conductor.personal.yaml"

# Extra profile env. An existing key in .env is kept — this only fills gaps.
[[env]]
key   = "EXAMPLE_OVERLAY_KEY"
value = "set-me"

# ── Secrets backend example (HashiCorp Vault) ──────────────────────────────────
# files/scripts/secrets/backend-vault.sh (below) lands beside the core adapters via the
# path-mirror — secret-get.sh discovers any backend-<name>.sh, no registration needed.
# Turn it on by putting `vault` in the chain, and give it its non-secret coordinates here.
# The Vault TOKEN is a real per-box secret — keep it in ~/.tmux/env.sh, NOT committed here.
[[env]]
key   = "NEXUS_SECRETS_BACKENDS"
value = "env,vault"

[[env]]
key   = "VAULT_ADDR"
value = "https://vault.internal.example:8200"

[[env]]
key   = "VAULT_SECRET_PATH"
value = "secret/agents-nexus"
