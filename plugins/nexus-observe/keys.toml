# nexus.observe keybindings — appended to ~/.config/herdr/config.toml by
# scripts/herdr-plugin-install.sh (herdr manifests can't declare keys).
[[keys.command]]
key = "prefix+shift+m"
type = "plugin_action"
command = "nexus.observe.memory"

[[keys.command]]
key = "prefix+shift+a"
type = "plugin_action"
command = "nexus.observe.apm"

[[keys.command]]
# prefix+shift+f ("find") — shift+s is taken by nexus-fleet, shift+m/a by our own panels.
key = "prefix+shift+f"
type = "plugin_action"
command = "nexus.observe.memory-search"

[[keys.command]]
# prefix+shift+o ("ops/observe") — free across base config + all plugins.
key = "prefix+shift+o"
type = "plugin_action"
command = "nexus.observe.command-center"
